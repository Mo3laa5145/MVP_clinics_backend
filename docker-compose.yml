services:
  backend:
    build: .
    container_name: clinica-backend
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/clinica
      JWT_SECRET: change-me-in-production
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: clinica-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clinica
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d clinica']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
